spring.application.name=paluto

server.port=8080
# === CHANGED: DATABASE SETTINGS FOR SUPABASE (PostgreSQL) ===
# Replace [HOST] with the Host found in Supabase Settings > Database
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# === CHANGED: JPA SETTINGS FOR POSTGRESQL ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Updated Dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

#Google Auth Credential
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=profile,email

# Use a long, base64 encoded string for security
app.jwt.secret=
app.jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Supabase credentials
supabase.url=
supabase.key=
supabase.bucket=service-images

paymongo.test.key=
paymongo.webhook.secret=
