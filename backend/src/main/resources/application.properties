spring.application.name=paluto

server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/paluto
spring.datasource.username=root
spring.datasource.password=123456

#JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

#Google Auth Credential
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=profile,email

# Use a long, base64 encoded string for security
app.jwt.secret=
app.jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Supabase credentials
supabase.url=
supabase.key=
supabase.bucket=service-images

paymongo.test.key=
paymongo.webhook.secret=

