spring.application.name=paluto

server.port=8080

# === CHANGED: DATABASE SETTINGS FOR SUPABASE (PostgreSQL) ===
# Supabase Database
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# === CHANGED: JPA SETTINGS FOR POSTGRESQL ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Updated Dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

#Google Auth Credential
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=profile,email

# Use a long, base64 encoded string for security
app.jwt.secret=
app.jwt.expiration=86400000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Supabase Storage credentials
supabase.url=
supabase.key=
supabase.service.bucket=service-images
supabase.certificate.bucket=certificates

#Paymongo
paymongo.test.key=
paymongo.webhook.secret=


#SMTP Credentials
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
# NOTE: This must be a 16-character "App Password", NOT your regular login password!
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true