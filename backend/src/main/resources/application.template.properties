spring.application.name=paluto
server.port=8080

# ===================================================================
# DATABASE SETTINGS FOR SUPABASE (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://<YOUR_SUPABASE_HOST>:<PORT>/postgres
spring.datasource.username=<YOUR_DATABASE_USERNAME>
spring.datasource.password=<YOUR_DATABASE_PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE SETTINGS
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ===================================================================
# SECURITY & AUTHENTICATION (Google OAuth2 & JWT)
# ===================================================================
# Google Auth Credentials
spring.security.oauth2.client.registration.google.client-id=<YOUR_GOOGLE_CLIENT_ID>
spring.security.oauth2.client.registration.google.client-secret=<YOUR_GOOGLE_CLIENT_SECRET>
spring.security.oauth2.client.registration.google.scope=profile,email

# JWT Security Settings (Must be a long, base64 encoded string)
app.jwt.secret=<YOUR_JWT_SECRET_KEY_HERE>
app.jwt.expiration=86400000

# ===================================================================
# FILE MULTIPART UPLOADS
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# THIRD-PARTY INTEGRATIONS (Supabase Storage & PayMongo)
# ===================================================================
# Supabase Storage Credentials
supabase.url=<YOUR_SUPABASE_PROJECT_URL>
supabase.key=<YOUR_SUPABASE_ANON_OR_SERVICE_KEY>
supabase.service.bucket=service-images
supabase.certificate.bucket=certificates

# PayMongo Gateway
paymongo.test.key=<YOUR_PAYMONGO_TEST_SECRET_KEY>
paymongo.webhook.secret=<YOUR_PAYMONGO_WEBHOOK_SIGNING_SECRET>

# ===================================================================
# MAIL SENDER (SMTP)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=<YOUR_GMAIL_ADDRESS>
# NOTE: This must be a 16-character "App Password", NOT your regular login password!
spring.mail.password=<YOUR_GMAIL_APP_PASSWORD>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true